networks:
  job_bot_network:
    driver: bridge

services:
  postgres:
    image: postgres:17-alpine
    container_name: job_bot_postgres
    environment:
      POSTGRES_DB: job_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - job_bot_network
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: job_bot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - job_bot_network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: job_bot_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: serve
    networks:
      - job_bot_network
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    container_name: job_bot_ollama_setup
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
      echo 'Waiting for Ollama...' &&
      sleep 10 &&
      echo 'Pulling model ${OLLAMA_MODEL:-llama3.1:8b}...' &&
      ollama pull ${OLLAMA_MODEL:-llama3.1:8b} &&
      echo 'Model pulled successfully.'
      "
    networks:
      - job_bot_network
    restart: on-failure

  bot:
    build: .
    container_name: job_bot_bot
    command: python -m app.main
    environment:
      - OLLAMA_HOST=ollama:11434
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./app:/app/app                # Монтируем код для разработки
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - job_bot_network
    restart: unless-stopped

  worker:
    build: .
    container_name: job_bot_worker
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info
    environment:
      - OLLAMA_HOST=ollama:11434
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./app:/app/app                # Монтируем код для разработки
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - job_bot_network
    restart: unless-stopped

  beat:
    build: .
    container_name: job_bot_beat
    command: celery -A app.worker.celery_app:celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app                # Монтируем код для разработки
      - ./logs:/app/logs
    networks:
      - job_bot_network
    restart: unless-stopped

volumes:
  pg_data:
    name: job_bot_pg_data
  ollama_data:
    name: job_bot_ollama_data