networks:
  job_bot_network:
    driver: bridge

services:
  postgres:
    image: postgres:17-alpine
    container_name: job_bot_postgres
    environment:
      POSTGRES_DB: job_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - job_bot_network
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: job_bot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - job_bot_network
    restart: unless-stopped

  bot:
    build: .
    container_name: job_bot_bot
    command: sh -c "poetry run alembic upgrade head && poetry run python -m app.main"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - job_bot_network
    restart: unless-stopped

  worker:
    build: .
    container_name: job_bot_worker
    command: poetry run celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - job_bot_network
    restart: unless-stopped

  beat:
    build: .
    container_name: job_bot_beat
    command: poetry run celery -A app.worker.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - job_bot_network
    restart: unless-stopped

  migration:
    build: .
    command: poetry run alembic upgrade head
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - job_bot_network
    restart: "no"

volumes:
  pg_data:
    name: job_bot_pg_data